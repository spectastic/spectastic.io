<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="spectastic">
  <!-- 017-brand-logo · canonical spectrum mark. Prong path rotated 8× at 45°,
       in fixed lifecycle order. Spectrum (light) + the brightened set under
       prefers-color-scheme:dark, so the tab icon stays legible on dark chrome. -->
  <style>
    .p1{fill:#5f023e}.p2{fill:#960462}.p3{fill:#e1624f}.p4{fill:#e0a23c}.p5{fill:#3f6a37}.p6{fill:#04a5bb}.p7{fill:#00758f}.p8{fill:#7558b2}
    @media (prefers-color-scheme:dark){.p1{fill:#e98cb6}.p2{fill:#e85aab}.p3{fill:#f08a79}.p4{fill:#ffd09c}.p5{fill:#8fb56a}.p6{fill:#42cadd}.p7{fill:#2bb0c4}.p8{fill:#b29bdf}}
  </style>
  <path class="p1" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(0 50 50)"/>
  <path class="p2" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(45 50 50)"/>
  <path class="p3" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(90 50 50)"/>
  <path class="p4" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(135 50 50)"/>
  <path class="p5" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(180 50 50)"/>
  <path class="p6" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(225 50 50)"/>
  <path class="p7" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(270 50 50)"/>
  <path class="p8" d="M50 50 L43.5 18 Q50 10.5 56.5 18 Z" transform="rotate(315 50 50)"/>
</svg>
